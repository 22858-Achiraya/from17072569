<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มลงทะเบียนนักเรียน 🎒✨</title>
    <!-- เรียกใช้ฟอนต์ Prompt จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* กำหนดตัวแปรสีตามโทนที่ต้องการ */
            --color-white: #ffffff;
            --color-light-blue: #e0f2fe;
            --color-blue: #3b82f6;
            --color-dark-blue: #1e3a8a;
            --color-purple: #a855f7;
            --color-pink: #ec4899;
            --color-light-pink: #fce7f3;
            --color-border: #cbd5e1;
            --color-text: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            /* พื้นหลังไล่สี ฟ้า -> ชมพู -> ม่วง */
            background: linear-gradient(135deg, #e0f2fe 0%, #fce7f3 50%, #f3e8ff 100%);
            color: var(--color-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: var(--color-white);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(168, 85, 247, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งส่วนหัว */
        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h1 {
            color: var(--color-dark-blue);
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .form-header p {
            color: var(--color-purple);
            font-size: 16px;
        }

        .mascot {
            font-size: 45px;
            margin-bottom: 10px;
        }

        /* การจัดกลุ่ม Fieldset */
        fieldset {
            border: 2px dashed #c084fc;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            background-color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        fieldset:hover {
            border-color: var(--color-pink);
            background-color: var(--color-white);
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.05);
        }

        legend {
            /* ป้ายชื่อหัวข้อไล่สี น้ำเงิน -> ม่วง -> ชมพู */
            background: linear-gradient(to right, var(--color-blue), var(--color-purple), var(--color-pink));
            color: var(--color-white);
            padding: 8px 25px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);
        }

        /* Grid Layout สำหรับ Input */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* ตกแต่ง Label และ Input */
        label {
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-dark-blue);
            font-size: 15px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--color-light-blue);
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f8fafc;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--color-purple);
            background-color: var(--color-white);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="color"] {
            padding: 2px;
            height: 45px;
            cursor: pointer;
            border-radius: 12px;
        }

        /* Custom Radio & Checkbox */
        .option-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 10px 0;
        }

        .option-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 400;
            color: var(--color-text);
        }

        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--color-pink);
            cursor: pointer;
        }

        /* File Upload */
        input[type="file"] {
            padding: 10px;
            background-color: var(--color-light-pink);
            border: 2px dashed var(--color-pink);
            border-radius: 12px;
            cursor: pointer;
            color: var(--color-text);
        }

        /* Terms & Conditions */
        .terms-group {
            background-color: var(--color-light-blue);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid #bae6fd;
        }

        .terms-group label {
            color: var(--color-dark-blue);
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* ปุ่ม Buttons */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 14px 40px;
            border: none;
            border-radius: 30px;
            font-family: inherit;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button[type="submit"] {
            background: linear-gradient(to right, var(--color-blue), var(--color-purple));
            color: var(--color-white);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.5);
            background: linear-gradient(to right, var(--color-purple), var(--color-pink));
        }

        button[type="reset"] {
            background-color: #f1f5f9;
            color: #64748b;
            border: 2px solid var(--color-border);
        }

        button[type="reset"]:hover {
            background-color: #e2e8f0;
            color: var(--color-pink);
            border-color: var(--color-pink);
            transform: translateY(-2px);
        }

        /* Responsive Design สำหรับมือถือ */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-container {
                padding: 25px 20px;
            }
            .form-header h1 {
                font-size: 24px;
            }
            .button-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <div class="mascot">👩‍🎓📚🦄</div>
            <h1>แบบฟอร์มบันทึกข้อมูลนักเรียน</h1>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง (✩ ⋆ ✩ ⋆ ✩ ⋆ ✩)</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <!-- 1. ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>📝 1. ข้อมูลส่วนตัว</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="title">คำนำหน้า</label>
                        <select id="title" name="title" required>
                            <option value="">-- เลือกคำนำหน้า --</option>
                            <option value="ด.ช.">เด็กชาย (ด.ช.)</option>
                            <option value="ด.ญ.">เด็กหญิง (ด.ญ.)</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="ตัวอย่าง: สมหญิง รักเรียน" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="ตัวอย่าง: หญิง">
                    </div>
                    <div class="form-group">
                        <label for="studentid">เลขประจำตัวนักเรียน</label>
                        <input type="number" id="studentid" name="studentid" placeholder="ระบุตัวเลขประจำตัว" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">วันเดือนปีเกิด</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" min="1" max="100" placeholder="ตัวอย่าง: 16" required>
                    </div>
                </div>
            </fieldset>

            <!-- 2. ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>📞 2. ข้อมูลการติดต่อ</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="email">อีเมล (Email)</label>
                        <input type="email" id="email" name="email" placeholder="example@school.ac.th" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" name="phone" placeholder="08x-xxx-xxxx" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="address">ที่อยู่ปัจจุบัน</label>
                        <textarea id="address" name="address" placeholder="บ้านเลขที่, หมู่, ถนน, ตำบล, อำเภอ, รหัสไปรษณีย์..." required></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- 3. ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>👤 3. ข้อมูลส่วนบุคคล</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label>เพศ</label>
                        <div class="option-group">
                            <label><input type="radio" name="gender" value="ชาย" required> 👦 ชาย</label>
                            <label><input type="radio" name="gender" value="หญิง"> 👧 หญิง</label>
                            <label><input type="radio" name="gender" value="อื่นๆ"> 🌈 อื่นๆ</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion" required>
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="พราหมณ์-ฮินดู">พราหมณ์-ฮินดู</option>
                            <option value="อื่นๆ/ไม่มีศาสนา">อื่นๆ / ไม่มีศาสนา</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="province">ภูมิลำเนา (จังหวัด)</label>
                        <input type="text" id="province" name="province" placeholder="ตัวอย่าง: เชียงใหม่">
                    </div>
                    <div class="form-group">
                        <label for="bloodtype">กรุ๊ปเลือด</label>
                        <select id="bloodtype" name="bloodtype" required>
                            <option value="">-- เลือกกรุ๊ปเลือด --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="AB">AB</option>
                            <option value="O">O</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 4. ความสนใจ -->
            <fieldset>
                <legend>🎨 4. ความสนใจ</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                        <div class="option-group">
                            <label><input type="checkbox" name="hobby" value="อ่านหนังสือ"> 📖 อ่านหนังสือ</label>
                            <label><input type="checkbox" name="hobby" value="เล่นดนตรี"> 🎸 เล่นดนตรี</label>
                            <label><input type="checkbox" name="hobby" value="วาดรูป"> 🎨 วาดรูป</label>
                            <label><input type="checkbox" name="hobby" value="เล่นกีฬา"> ⚽ เล่นกีฬา</label>
                            <label><input type="checkbox" name="hobby" value="เล่นเกม"> 🎮 เล่นเกม</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="favcolor">สีที่ชอบ (คลิกเพื่อเลือกสี)</label>
                        <input type="color" id="favcolor" name="favcolor" value="#a855f7">
                    </div>
                    <div class="form-group">
                        <label for="website">เว็บไซต์ที่ชื่นชอบ</label>
                        <input type="url" id="website" name="website" placeholder="https://www.example.com">
                    </div>
                </div>
            </fieldset>

            <!-- 5. ข้อมูลการศึกษา -->
            <fieldset>
                <legend>🎓 5. ข้อมูลการศึกษา</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="grade">ระดับชั้น</label>
                        <select id="grade" name="grade" required>
                            <option value="">-- เลือกระดับชั้น --</option>
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="room">ห้องเรียน (ระบุเป็นตัวเลข)</label>
                        <input type="number" id="room" name="room" min="1" max="20" placeholder="ตัวอย่าง: 1" required>
                    </div>
                    <div class="form-group">
                        <label for="major">แผนการเรียน</label>
                        <input type="text" id="major" name="major" placeholder="ตัวอย่าง: วิทย์-คณิต, ศิลป์-ภาษา" required>
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPA)</label>
                        <input type="number" id="gpa" name="gpa" step="0.01" min="0" max="4.00" placeholder="ตัวอย่าง: 3.50">
                    </div>
                </div>
            </fieldset>

            <!-- 6. การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>📂 6. การอัปโหลดไฟล์</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="profile_pic">รูปภาพประจำตัว (อัปโหลดรูปภาพ)</label>
                        <input type="file" id="profile_pic" name="profile_pic" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="documents">เอกสารเพิ่มเติม (PDF, DOCX)</label>
                        <input type="file" id="documents" name="documents" accept=".pdf, .doc, .docx">
                    </div>
                </div>
            </fieldset>

            <!-- 7. ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>💬 7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group full-width">
                    <label for="comments">ข้อเสนอแนะหรือสิ่งที่อยากบอกคุณครู 💖</label>
                    <textarea id="comments" name="comments" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
                </div>
            </fieldset>

            <!-- 8. ยืนยันข้อมูลและปุ่มดำเนินการ -->
            <div class="terms-group">
                <label>
                    <input type="checkbox" name="terms" required>
                    ข้าพเจ้ายืนยันว่าข้อมูลข้างต้นเป็นความจริงทุกประการ และยอมรับเงื่อนไขการใช้งาน
                </label>
            </div>

            <div class="button-group">
                <button type="submit">✨ ส่งข้อมูลเลย!</button>
                <button type="reset">🧹 ล้างข้อมูล</button>
            </div>

        </form>
    </div>

</body>
</html>
