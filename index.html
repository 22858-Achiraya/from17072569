<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มบันทึกข้อมูลนักเรียน 🎒✨</title>
    <!-- เรียกใช้ฟอนต์ Prompt จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* กำหนดตัวแปรสีโทน ฟ้า น้ำเงิน ขาว ม่วง ชมพู */
        :root {
            --bg-gradient-1: #e0f2fe; /* ฟ้าอ่อน */
            --bg-gradient-2: #f3e8ff; /* ม่วงอ่อน */
            --bg-gradient-3: #fce7f3; /* ชมพูอ่อน */
            --color-navy: #1e3a8a;    /* น้ำเงินเข้ม */
            --color-blue: #3b82f6;    /* ฟ้า */
            --color-purple: #8b5cf6;  /* ม่วง */
            --color-pink: #ec4899;    /* ชมพู */
            --color-white: #ffffff;   /* ขาว */
            --text-dark: #334155;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            /* พื้นหลังไล่สีพาสเทล */
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-attachment: fixed;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.15);
        }

        /* ส่วนหัวและตัวการ์ตูน */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .mascot {
            font-size: 50px;
            margin-bottom: 10px;
            animation: bounce 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header-section h1 {
            color: var(--color-navy);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header-section p {
            color: var(--color-purple);
            font-size: 15px;
        }

        /* ตกแต่ง Fieldset (กลุ่มข้อมูล) */
        fieldset {
            border: 2px dashed var(--color-purple);
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 25px;
            background-color: var(--color-white);
            transition: all 0.3s;
        }

        fieldset:hover {
            border-color: var(--color-pink);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.05);
        }

        legend {
            background: linear-gradient(135deg, var(--color-blue), var(--color-purple));
            color: var(--color-white);
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
        }

        /* จัด Layout เป็น Grid 2 คอลัมน์ */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--color-navy);
            font-weight: 500;
        }

        /* ตกแต่ง Input Elements */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background-color: #f8fafc;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--color-blue);
            background-color: var(--color-white);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="color"] {
            padding: 2px;
            height: 42px;
            cursor: pointer;
            border-radius: 12px;
        }

        /* Checkbox & Radio */
        .checkbox-group, .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 8px 0;
        }

        .checkbox-group label, .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 400;
        }

        input[type="checkbox"], input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: var(--color-pink);
            cursor: pointer;
        }

        /* File Upload */
        input[type="file"] {
            padding: 10px;
            background-color: var(--bg-gradient-1);
            border: 1.5px dashed var(--color-blue);
            cursor: pointer;
        }

        /* ส่วนยืนยันและปุ่ม */
        .confirmation-box {
            background-color: var(--bg-gradient-3);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--color-pink);
        }

        .confirmation-box label {
            color: var(--color-navy);
            font-size: 15px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 35px;
            border: none;
            border-radius: 25px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, var(--color-blue), var(--color-purple));
            color: var(--color-white);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        button[type="reset"] {
            background-color: #e2e8f0;
            color: var(--text-dark);
        }

        button[type="reset"]:hover {
            background-color: #cbd5e1;
            transform: translateY(-2px);
        }

        /* Responsive Design สำหรับมือถือ */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-container {
                padding: 25px 20px;
            }
            .button-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header-section">
            <div class="mascot">👩‍🎓🦄📘</div>
            <h1>แบบฟอร์มลงทะเบียนนักเรียน</h1>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนเพื่อประโยชน์ของตัวท่านเองนะคะ/ครับ ✨</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <!-- 1. ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>📝 1. ข้อมูลส่วนตัว</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prefix">คำนำหน้า</label>
                        <select id="prefix" name="prefix" required>
                            <option value="">-- เลือก --</option>
                            <option value="ด.ช.">เด็กชาย (ด.ช.)</option>
                            <option value="ด.ญ.">เด็กหญิง (ด.ญ.)</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="เช่น สมหญิง รักเรียน" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="เช่น ฟ้า">
                    </div>
                    <div class="form-group">
                        <label for="student_id">เลขประจำตัวนักเรียน</label>
                        <input type="text" id="student_id" name="student_id" pattern="[0-9]{5,10}" placeholder="ระบุตัวเลขเท่านั้น" required>
                    </div>
                    <div class="form-group">
                        <label for="dob">วันเดือนปีเกิด</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" min="1" max="100" placeholder="เช่น 15">
                    </div>
                </div>
            </fieldset>

            <!-- 2. ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>📱 2. ข้อมูลการติดต่อ</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" name="email" placeholder="example@school.ac.th">
                    </div>
                    <div class="form-group">
                        <label for="tel">เบอร์โทรศัพท์</label>
                        <input type="tel" id="tel" name="tel" placeholder="08xxxxxxxx" pattern="[0-9]{10}">
                    </div>
                    <div class="form-group full-width">
                        <label for="address">ที่อยู่ปัจจุบัน</label>
                        <textarea id="address" name="address" placeholder="บ้านเลขที่ หมู่ ซอย ถนน ตำบล อำเภอ จังหวัด รหัสไปรษณีย์..."></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- 3. ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>👤 3. ข้อมูลส่วนบุคคล</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label>เพศ</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="ชาย" required> ชาย 👦</label>
                            <label><input type="radio" name="gender" value="หญิง"> หญิง 👧</label>
                            <label><input type="radio" name="gender" value="อื่นๆ"> อื่นๆ 🌈</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion">
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="อื่นๆ">อื่นๆ / ไม่มีศาสนา</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="province">ภูมิลำเนา (จังหวัด)</label>
                        <input type="text" id="province" name="province" placeholder="เช่น กรุงเทพมหานคร">
                    </div>
                    <div class="form-group">
                        <label for="blood_type">กรุ๊ปเลือด</label>
                        <select id="blood_type" name="blood_type">
                            <option value="">-- ไม่ทราบ --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="AB">AB</option>
                            <option value="O">O</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 4. ความสนใจ -->
            <fieldset>
                <legend>🎨 4. ความสนใจ</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="hobby" value="อ่านหนังสือ"> 📖 อ่านหนังสือ</label>
                            <label><input type="checkbox" name="hobby" value="ฟังเพลง"> 🎧 ฟังเพลง</label>
                            <label><input type="checkbox" name="hobby" value="เล่นกีฬา"> 🏀 เล่นกีฬา</label>
                            <label><input type="checkbox" name="hobby" value="วาดรูป"> 🎨 วาดรูป</label>
                            <label><input type="checkbox" name="hobby" value="เล่นเกม"> 🎮 เล่นเกม</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fav_color">สีที่ชอบ (คลิกเพื่อเลือก)</label>
                        <input type="color" id="fav_color" name="fav_color" value="#8b5cf6">
                    </div>
                    <div class="form-group">
                        <label for="website">เว็บไซต์ที่ชอบ (URL)</label>
                        <input type="url" id="website" name="website" placeholder="https://www...">
                    </div>
                </div>
            </fieldset>

            <!-- 5. ข้อมูลการศึกษา -->
            <fieldset>
                <legend>📚 5. ข้อมูลการศึกษา</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="grade">ระดับชั้น</label>
                        <select id="grade" name="grade" required>
                            <option value="">-- เลือก --</option>
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="room">ห้องเรียน</label>
                        <input type="number" id="room" name="room" min="1" max="20" placeholder="เช่น 1">
                    </div>
                    <div class="form-group">
                        <label for="major">แผนการเรียน</label>
                        <input type="text" id="major" name="major" placeholder="เช่น วิทย์-คณิต">
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPA)</label>
                        <input type="number" id="gpa" name="gpa" step="0.01" min="0" max="4" placeholder="0.00 - 4.00">
                    </div>
                </div>
            </fieldset>

            <!-- 6. การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>📁 6. การอัปโหลดไฟล์</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="profile_pic">รูปภาพประจำตัว (JPG, PNG)</label>
                        <input type="file" id="profile_pic" name="profile_pic" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label for="documents">เอกสารเพิ่มเติม (PDF, DOCX)</label>
                        <input type="file" id="documents" name="documents" accept=".pdf,.doc,.docx">
                    </div>
                </div>
            </fieldset>

            <!-- 7. ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>💬 7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group full-width">
                    <label for="comments">ข้อเสนอแนะหรือสิ่งที่อยากบอก</label>
                    <textarea id="comments" name="comments" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
                </div>
            </fieldset>

            <!-- 8. ยืนยันข้อมูล -->
            <div class="confirmation-box">
                <label>
                    <input type="checkbox" name="agreement" required>
                    ข้าพเจ้ายืนยันว่าข้อมูลทั้งหมดถูกต้อง เป็นความจริง และยอมรับเงื่อนไขการใช้งาน 💖
                </label>
            </div>

            <div class="button-group">
                <button type="submit">ส่งข้อมูล 🚀</button>
                <button type="reset">ล้างข้อมูล 🔄</button>
            </div>

        </form>
    </div>

</body>
</html>
